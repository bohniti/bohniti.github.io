<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#FFFCF0">
  <title>{{ if not .IsHome }}{{ .Title }} — {{ end }}{{ .Site.Title }}</title>
  {{ partial "favicon.html" . }}
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <script>
    // Theme bootstrap — reads localStorage key 'theme', falls back to OS prefers-color-scheme.
    (function () {
      let theme;
      try { theme = localStorage.getItem('theme'); } catch (_) {}
      if (theme !== 'light' && theme !== 'dark') {
        theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.dataset.theme = theme;
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', theme === 'dark' ? '#100F0F' : '#FFFCF0');
    })();
  </script>
  <link rel="stylesheet" href="{{ "css/style.css" | absURL }}">
</head>
<body class="page-{{ .Type | default "default" }}">
  <div class="site-wrapper">
    {{ partial "header.html" . }}
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </div>
  <script>
    // Theme toggle — single click handler. JS writes only documentElement.dataset.theme;
    // CSS reads it (icon visibility, palette swap). aria-label is action-oriented:
    // it describes the click target, not the current state (D-03, D-08, D-10).
    // The icon SVGs are never touched by JS — visibility is 100% CSS (Pitfall 22 mitigation).
    (function () {
      const toggle = document.querySelector('.theme-toggle');
      if (!toggle) return;
      const meta = document.querySelector('meta[name="theme-color"]');

      // First-paint sync: server-rendered HTML always says aria-pressed="false" and
      // aria-label="Switch to dark mode". If the head IIFE resolved dark, reconcile.
      const initial = document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
      toggle.setAttribute('aria-pressed', initial === 'dark' ? 'true' : 'false');
      toggle.setAttribute('aria-label', initial === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');

      toggle.addEventListener('click', function () {
        const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        document.documentElement.dataset.theme = next;
        toggle.setAttribute('aria-pressed', next === 'dark' ? 'true' : 'false');
        toggle.setAttribute('aria-label', next === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
        try { localStorage.setItem('theme', next); } catch (_) { /* Safari private mode */ }
        if (meta) meta.setAttribute('content', next === 'dark' ? '#100F0F' : '#FFFCF0');
      });
    })();
  </script>
</body>
</html>
