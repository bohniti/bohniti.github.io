{{ define "main" }}
  <article>
    <div class="page-header">
      <h1 class="page-title">{{ .Title }}</h1>
      {{ if .Date }}
        <div class="page-date">{{ .Date.Format "January 2, 2006" }}</div>
      {{ end }}
    </div>
    <div class="page-content">
      {{ .Content }}
    </div>
  </article>
{{ end }}
