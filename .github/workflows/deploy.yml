name: Deploy Hugo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.157.0
    steps:
      - name: Install Hugo
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify EXIF scrub (gallery)
        run: |
          sudo apt-get update
          sudo apt-get install -y libimage-exiftool-perl
          # D-23 layer 2 — fail the build if any forbidden EXIF field appears
          # in source photos. Layer 1 (Hugo [imaging.exif] disableLatLong) stays
          # in hugo.toml. This step is the defensive CI gate.
          shopt -s nullglob nocaseglob
          photos=(content/gallery/photos/*.jpg content/gallery/photos/*.jpeg)
          if [ ${#photos[@]} -eq 0 ]; then
            echo "::error::No gallery photos found at content/gallery/photos/"
            exit 1
          fi
          forbidden='GPSLatitude|GPSLongitude|Make|Model|SerialNumber'
          if exiftool "${photos[@]}" 2>/dev/null | grep -E "^($forbidden)[[:space:]]*:"; then
            echo "::error::EXIF scrub failed — forbidden fields present in content/gallery/photos/*."
            exit 1
          fi
          echo "EXIF scrub verified: no GPS/Make/Model/Serial fields in ${#photos[@]} gallery photos."
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
